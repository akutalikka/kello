<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelloharjoitus</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f4f8;
            margin: 20px;
        }

        .main-container {
            display: flex;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 900px;
        }

        /* Vasen puoli: Kello */
        .left-panel {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #clock-canvas {
            background-color: #fff;
            border-radius: 50%;
        }

        /* Oikea puoli: Ohjaimet */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex: 1;
            min-width: 350px;
        }

        /* Tarkistusosio uuteen paikkaan */
        .check-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #check-btn {
            padding: 18px;
            font-size: 22px;
            font-weight: bold;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s, background 0.2s;
        }

        #check-btn:active { transform: scale(0.98); }
        #check-btn:hover { background-color: #45a049; }

        #message {
            height: 35px;
            font-weight: bold;
            text-align: center;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        /* Valintaryhmät */
        .option-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        /* Tuntien kaksi riviä */
        .hours-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
        }

        .box {
            min-width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #ccc;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.2s;
            background: #fff;
        }

        .box.wide { width: 100px; height: 50px; }
        .box:hover { border-color: #2196F3; background: #e3f2fd; }
        .box.selected { background: #2196F3; color: white; border-color: #1976D2; box-shadow: 0 0 8px rgba(33,150,243,0.5); }

        h3 { margin: 0 0 5px 0; color: #333; font-size: 1.3rem; }
    </style>
</head>
<body>

    <h1>Kello-oppitunti</h1>

    <div class="main-container">
        <div class="left-panel">
            <canvas id="clock-canvas" width="250" height="250"></canvas>
        </div>

        <div class="controls">
            <div class="check-section">
                <button id="check-btn">Tarkista</button>
                <div id="message"></div>
            </div>

            <div>
                <h3>Minuutit</h3>
                <div class="option-group" id="minutes-group">
                    <div class="box" data-val="5">5</div>
                    <div class="box" data-val="10">10</div>
                    <div class="box" data-val="15">15</div>
                    <div class="box" data-val="20">20</div>
                    <div class="box" data-val="25">25</div>
                    <div class="box" data-val="0" title="Tyhjä"></div>
                </div>
            </div>

            <div class="option-group" id="rel-group">
                <div class="box wide" data-val="yli">yli</div>
                <div class="box wide" data-val="puoli">puoli</div>
                <div class="box wide" data-val="vaille">vaille</div>
                <div class="box wide" data-val="tasan">tasan</div>
            </div>

            <div>
                <h3>Tunnit</h3>
                <div class="hours-grid" id="hours-group">
                    </div>
            </div>
        </div>
    </div>

            div.className = 'box';
            div.innerText = i;
            div.dataset.val = i;
            hoursGroup.appendChild(div);
        }

        // Valintojen klikkauslogiikka
        document.querySelectorAll('.option-group, .hours-grid').forEach(group => {
            group.addEventListener('click', (e) => {
                if (e.target.classList.contains('box')) {
                    const isAlreadySelected = e.target.classList.contains('selected');
                    group.querySelectorAll('.box').forEach(b => b.classList.remove('selected'));
                    if (!isAlreadySelected) e.target.classList.add('selected');
                }
            });
        });
