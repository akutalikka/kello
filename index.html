<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelloharjoitus</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
        }

        .top-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 30px;
            gap: 20px;
            flex-wrap: wrap;
        }

        #clock-canvas {
            background-color: #fff;
            border-radius: 50%;
        }

        .check-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            min-width: 250px;
        }

        #check-btn {
            padding: 25px 40px;
            font-size: 26px;
            font-weight: bold;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 0 #388E3C;
            transition: all 0.1s;
        }

        #check-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #388E3C;
        }

        #message {
            font-size: 1.5rem;
            font-weight: bold;
            height: 60px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .selection-area {
            display: flex;
            flex-direction: column;
            gap: 25px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }

        .option-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }

        .box {
            min-width: 65px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #ccc;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.4rem;
            background: white;
            transition: all 0.2s;
            user-select: none;
        }

        .box.wide { width: 120px; height: 55px; }
        .box:hover { border-color: #2196F3; background: #e3f2fd; }
        .box.selected { background: #2196F3; color: white; border-color: #1976D2; }

        h3 { margin: 0 0 10px 0; color: #555; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-row">
            <canvas id="clock-canvas" width="280" height="280"></canvas>
            <div class="check-area">
                <button id="check-btn">TARKISTA</button>
                <div id="message"></div>
            </div>
        </div>

        <div class="selection-area">
            <div>
                <h3>Minuutit</h3>
                <div class="option-group" id="minutes-group">
                    <div class="box" data-val="5">5</div>
                    <div class="box" data-val="10">10</div>
                    <div class="box" data-val="15">15</div>
                    <div class="box" data-val="20">20</div>
                    <div class="box" data-val="25">25</div>
                    <div class="box" data-val="0"></div>
                </div>
            </div>

            <div class="option-group" id="rel-group">
                <div class="box wide" data-val="yli">yli</div>
                <div class="box wide" data-val="puoli">puoli</div>
                <div class="box wide" data-val="vaille">vaille</div>
                <div class="box wide" data-val="tasan">tasan</div>
            </div>

            <div>
                <h3>Tunnit</h3>
                <div class="option-group" id="hours-row-1"></div>
                <div class="option-group" id="hours-row-2" style="margin-top:10px;"></div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('clock-canvas');
        const ctx = canvas.getContext('2d');
        const radius = canvas.height / 2;
        ctx.translate(radius, radius);
        const drawRadius = radius * 0.90;

        let targetHour = 0;
        let targetMinute = 0;

        const row1 = document.getElementById('hours-row-1');
        const row2 = document.getElementById('hours-row-2');
        for (let i = 1; i <= 12; i++) {
            const div = document.createElement('div');
            div.className = 'box';
            div.innerText = i;
            div.dataset.val = i;
            if (i <= 6) row1.appendChild(div); else row2.appendChild(div);
        }

        document.querySelectorAll('.option-group').forEach(group => {
            group.addEventListener('click', (e) => {
                const target = e.target.closest('.box');
                if (target) {
                    if (group.id.startsWith('hours-row')) {
                        document.querySelectorAll('[id^="hours-row"] .box').forEach(b => b.classList.remove('selected'));
                    } else {
                        group.querySelectorAll('.box').forEach(b => b.classList.remove('selected'));
                    }
                    target.classList.add('selected');
                }
            });
        });

        function drawClock(h, m) {
            ctx.clearRect(-radius, -radius, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.arc(0, 0, drawRadius, 0, 2 * Math.PI);
            ctx.fillStyle = 'white';
            ctx.fill();
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 6;
            ctx.stroke();

            ctx.font = "bold 22px Arial";
            ctx.textBaseline = "middle";
            ctx.textAlign = "center";
            ctx.fillStyle = "#333";
            for (let num = 1; num <= 12; num++) {
                let ang = num * Math.PI / 6;
                ctx.rotate(ang);
                ctx.translate(0, -drawRadius * 0.82);
                ctx.rotate(-ang);
                ctx.fillText(num.toString(), 0, 2); 
                ctx.rotate(ang);
                ctx.translate(0, drawRadius * 0.82);
                ctx.rotate(-ang);
            }

            drawHand((m * Math.PI / 30), drawRadius * 0.85, 4, "#2196F3");
            let hourPos = (h * Math.PI / 6) + (m * Math.PI / 360);
            drawHand(hourPos, drawRadius * 0.5, 9, "#333");

            ctx.beginPath();
            ctx.arc(0, 0, 8, 0, 2 * Math.PI);
            ctx.fillStyle = "#333";
            ctx.fill();
        }

        function drawHand(pos, length, width, color) {
            ctx.beginPath();
            ctx.lineWidth = width;
            ctx.lineCap = "round";
            ctx.strokeStyle = color;
            ctx.moveTo(0, 0);
            ctx.rotate(pos);
            ctx.lineTo(0, -length);
            ctx.stroke();
            ctx.rotate(-pos);
        }

        function randomizeTime() {
            targetHour = Math.floor(Math.random() * 12) + 1;
            targetMinute = Math.floor(Math.random() * 12) * 5;
            drawClock(targetHour, targetMinute);
            document.querySelectorAll('.box').forEach(b => b.classList.remove('selected'));
        }

        function showMessage(text, color, duration) {
            const msgDiv = document.getElementById('message');
            msgDiv.innerText = text;
            msgDiv.style.color = color;
            setTimeout(() => { if (msgDiv.innerText === text) msgDiv.innerText = ''; }, duration);
        }

        document.getElementById('check-btn').addEventListener('click', () => {
            const selMin = document.querySelector('#minutes-group .selected');
            const selRel = document.querySelector('#rel-group .selected');
            const selHour = document.querySelector('[id^="hours-row"] .selected');

            const relVal = selRel ? selRel.dataset.val : null;
            const hourVal = selHour ? parseInt(selHour.dataset.val) : null;
            const minVal = selMin ? parseInt(selMin.dataset.val) : 0;

            const minNeeded = (relVal === "yli" || relVal === "vaille");
            if (!relVal || !hourVal || (minNeeded && !selMin)) {
                showMessage("Valitse kellon aika!", "#d4a017", 2000);
                return;
            }

            let isCorrect = false;
            const nextHour = (targetHour % 12) + 1;

            // YKSINKERTAISTETTU TARKISTUSLOGIIKKA
            if (relVal === "tasan" && targetMinute === 0 && hourVal === targetHour) {
                isCorrect = true;
            } else if (relVal === "puoli" && targetMinute === 30 && hourVal === nextHour) {
                isCorrect = true;
            } else if (relVal === "yli" && targetMinute > 0 && targetMinute <= 25 && minVal === targetMinute && hourVal === targetHour) {
                isCorrect = true;
            } else if (relVal === "vaille" && targetMinute >= 35 && targetMinute < 60 && minVal === (60 - targetMinute) && hourVal === nextHour) {
                isCorrect = true;
            }

            if (isCorrect) {
                showMessage("Oikein!", "green", 2000);
                setTimeout(randomizeTime, 2000);
            } else {
                showMessage("Väärin! Yritä uudestaan", "red", 4000);
            }
        });

        randomizeTime();
    </script>
</body>
</html>
