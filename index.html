<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelloharjoitus</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f4f8;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
        }

        /* YLÄOSA: Kello ja Tarkistus */
        .top-row {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 30px;
            gap: 20px;
            flex-wrap: wrap;
        }

        #clock-canvas {
            background-color: #fff;
            border-radius: 50%;
        }

        .check-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            min-width: 250px;
        }

        #check-btn {
            padding: 25px 40px;
            font-size: 26px;
            font-weight: bold;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 0 #388E3C;
            transition: all 0.1s;
        }

        #check-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #388E3C;
        }

        #message {
            font-size: 1.5rem;
            font-weight: bold;
            height: 40px;
            text-align: center;
        }

        /* ALAOSA: Valinnat */
        .selection-area {
            display: flex;
            flex-direction: column;
            gap: 25px;
            border-top: 2px solid #eee;
            padding-top: 20px;
        }
